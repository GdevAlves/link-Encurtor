services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  urlshortener.api:
    image: urlshortener.api
    build:
      context: .
      dockerfile: UrlShortener.Api/Dockerfile
    environment:
      Redis__ConnectionString: ${REDIS_CONNECTION_STRING}
      ConnectionStrings__DefaultConnection: Server=mysql;Port=3306;Database=${MYSQL_DATABASE};Uid=${MYSQL_USER};Pwd=${MYSQL_PASSWORD};
      JwtSettings__Secret: ${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  urlshortener.application:
    image: urlshortener.application
    build:
      context: .
      dockerfile: UrlShortener.Application/Dockerfile

  urlshortener.domain:
    image: urlshortener.domain
    build:
      context: .
      dockerfile: UrlShortener.Domain/Dockerfile

  urlshortener.infra:
    image: urlshortener.infra
    build:
      context: .
      dockerfile: UrlShortener.Infra/Dockerfile

volumes:
  mysql_data:

